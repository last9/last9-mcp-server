# .github/workflows/release.yml
name: Release on Version Change

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  push:
    branches:
      - "release-**"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race ./...
        env:
          TEST_REFRESH_TOKEN: ${{ secrets.TEST_REFRESH_TOKEN }}

  tag-and-release:
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_changed: ${{ steps.version_change.outputs.changed }}
      new_version: ${{ steps.version_change.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR merge commit
        run: |
          git fetch origin main
          git checkout ${{ github.event.pull_request.merge_commit_sha }}

      - name: Get previous commit on main
        id: prev_commit
        run: |
          PREV_COMMIT=$(git rev-parse ${{ github.event.pull_request.merge_commit_sha }}^)
          echo "prev_commit=$PREV_COMMIT" >> $GITHUB_OUTPUT

      - name: Check if version changed in package.json
        id: version_change
        run: |
          OLD_VERSION=$(git show ${{ steps.prev_commit.outputs.prev_commit }}:package.json | jq -r .version)
          NEW_VERSION=$(jq -r .version package.json)
          echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag if version changed
        if: steps.version_change.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version_change.outputs.new_version }}
          git push origin v${{ steps.version_change.outputs.new_version }}

      - name: Run GoReleaser
        if: steps.version_change.outputs.changed == 'true'
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip-validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger homebrew-tap update workflow
        if: steps.version_change.outputs.changed == 'true'
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            https://api.github.com/repos/last9/homebrew-tap/dispatches \
            -d '{"event_type":"update-last9-mcp","client_payload":{"tag":"v${{ steps.version_change.outputs.new_version }}"}}'

  publish-npm:
    needs: tag-and-release
    if: needs.tag-and-release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version from package.json
        id: get_version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: npm_check
        run: |
          if npm view @last9/mcp-server@${{ steps.get_version.outputs.version }} version 2>/dev/null | grep -qF "${{ steps.get_version.outputs.version }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.exists == 'false'
        run: npm publish --access public --provenance

  # Multi-arch image build WITHOUT qemu (ENG-1074: qemu cross-arch docker
  # builds reliably time out on hosted runners). Instead: build each arch on a
  # native runner (D3 pattern, ENG-1049), push per-arch staging tags, then merge
  # into manifest lists in the docker-manifest job below.
  build-docker:
    needs: tag-and-release
    if: |
      always() &&
      (needs.tag-and-release.outputs.version_changed == 'true' ||
       (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release-')))
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest    # GitHub-hosted native amd64
          - arch: arm64
            runner: ubuntu-24.04-arm # GitHub-hosted native arm64 (no qemu)
    runs-on: ${{ matrix.runner }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version + build metadata
        id: meta
        run: |
          if [ "${{ needs.tag-and-release.outputs.version_changed }}" = "true" ]; then
            VERSION="${{ needs.tag-and-release.outputs.new_version }}"
          else
            VERSION="$(jq -r .version package.json)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Native build: matrix.arch always equals the runner's own arch, so
      # `--platform linux/${arch}` and the resulting binary are native — nothing
      # is emulated. Pushed under a per-arch staging tag keyed on the commit sha;
      # the docker-manifest job merges the two into the real tags.
      - name: Build and push (${{ matrix.arch }})
        env:
          DOCKER_BUILDKIT: "1"
          REPO: 652845092827.dkr.ecr.ap-south-1.amazonaws.com/mcp-server
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD_TIME: ${{ steps.meta.outputs.build_time }}
          SHA_SHORT: ${{ steps.meta.outputs.sha_short }}
        run: |
          STAGING="${REPO}:sha-${SHA_SHORT}-${{ matrix.arch }}"
          docker build -f Dockerfile \
            --platform "linux/${{ matrix.arch }}" \
            --build-arg VERSION="${VERSION}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg BUILD_TIME="${BUILD_TIME}" \
            --build-arg TARGETARCH="${{ matrix.arch }}" \
            -t "${STAGING}" .
          docker push "${STAGING}"

  # Merge the per-arch staging images into one manifest list per final tag.
  # `imagetools create` is a registry-side operation (reads the two arch
  # manifests, writes an OCI index) — no build, no qemu, no builder needed.
  docker-manifest:
    needs: [tag-and-release, build-docker]
    if: |
      always() &&
      needs.build-docker.result == 'success' &&
      (needs.tag-and-release.outputs.version_changed == 'true' ||
       (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release-')))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve final tags
        id: tags
        run: |
          echo "sha_short=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          if [ "${{ needs.tag-and-release.outputs.version_changed }}" = "true" ]; then
            VERSION="${{ needs.tag-and-release.outputs.new_version }}"
            echo "final_tags=v${VERSION} latest" >> "$GITHUB_OUTPUT"
          else
            VERSION="$(jq -r .version package.json)"
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "final_tags=${BRANCH} ${BRANCH}-v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create and push multi-arch manifests
        env:
          REPO: 652845092827.dkr.ecr.ap-south-1.amazonaws.com/mcp-server
          SHA_SHORT: ${{ steps.tags.outputs.sha_short }}
        run: |
          for TAG in ${{ steps.tags.outputs.final_tags }}; do
            docker buildx imagetools create \
              -t "${REPO}:${TAG}" \
              "${REPO}:sha-${SHA_SHORT}-amd64" \
              "${REPO}:sha-${SHA_SHORT}-arm64"
          done

      - name: Verify manifest list
        env:
          REPO: 652845092827.dkr.ecr.ap-south-1.amazonaws.com/mcp-server
        run: |
          FIRST="$(echo '${{ steps.tags.outputs.final_tags }}' | awk '{print $1}')"
          docker buildx imagetools inspect "${REPO}:${FIRST}"
